      <!-- Basic Details Section -->
      <div id="basic-details-section">
        <h2>Basic Details</h2>
        <label for="name"><b>Name:</b>
        <input type="text" id="name" name="name" required placeholder="Enter your name">
        <br>
        <label for="email"><b>Email:</b></label>
        <input type="email" id="email" name="email" required placeholder="Enter your email">
          <br>
        <label for="number"><b>Mobile No.:</b></label>
        <input type="number" id="number" name="number" required min="1234567890" placeholder="Enter your number">
          <br>
        <label for="sem"><b>Semester :</b></label>
        <input type="number" id="sem" name="sem" required placeholder="Enter your current semester">
        <br>
        <label for="text"><b>College Name:</b></label>
        <input type="text" id="text" name="text" required placeholder="Enter your college name">
      </div>
