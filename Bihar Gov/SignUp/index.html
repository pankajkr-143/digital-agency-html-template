<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>SignUp for Test</h1>
        <form action="https://api.web3forms.com/submit" method="POST" onsubmit="return validateForm()">
            <input type="hidden" name="access_key" value="3feae6ad-2dd7-488e-bbf8-74b290fe15f5">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="phone">Mobile No.:(Note: मोबाइल नंबर आपका पासवर्ड रहेगा |)</label>
                <input type="number" id="phone" name="phone" required>
            </div>
            <div class="form-group">
                <label for="preparation">Preparing For:</label>
                <select id="preparation" name="preparation" multiple required>
                    <option value="Bihar Daroga">Bihar Daroga</option>
                    <option value="BPSC">BPSC</option>
                    <option value="UPSC">UPSC</option>
                    <option value="Bihar Police">Bihar Police</option>
                    <option value="SSC">SSC</option>
                    <option value="Railway">Railway</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <button type="submit">Submit</button>
            <div id="message">SignUp करने के 15 मिनट के आप लॉगिन कर सकते है | और आपका मोबाइल नंबर ही आपका पासवर्ड होगा |</div>
            <hr>
            <div id="message">अगर आप अभी username और पासवर्ड लेना चाहते है तो कॉल कीजिये - 8235910315</div>
        </form>
    </div>    
    <script src="script.js"></script>
</body>
</html>
