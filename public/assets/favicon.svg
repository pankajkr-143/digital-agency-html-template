<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1220;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)" />

  <!-- Blue accent top bar -->
  <rect x="0" y="0" width="64" height="3" rx="1.5" fill="url(#letter)" />

  <!-- Letter M -->
  <text
    x="32"
    y="46"
    font-family="Arial, Helvetica, sans-serif"
    font-size="38"
    font-weight="900"
    fill="url(#letter)"
    text-anchor="middle"
    letter-spacing="-2"
  >M</text>
</svg>
