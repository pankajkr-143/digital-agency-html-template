<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="css/contact.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="contact-container">
        <h1>Contact Us</h1>
        <p class="contact-description">We'd love to hear from you! Send us a message using the form below.</p>
        <form id="contactForm" action="https://api.web3forms.com/submit" method="POST" onsubmit="return validateForm()">
            <input type="hidden" name="access_key" value="da091ed8-42eb-4541-ade0-28e5cf1c5168">
            
            <!-- Name Input -->
            <div class="input-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required>
            </div>

            <!-- Email Input -->
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your Email" required>
            </div>

            <!-- Message Textarea -->
            <div class="input-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Your Message" rows="5" required></textarea>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="submit-btn">Send Message</button>
        </form>

        <div id="responseMessage"></div> <!-- Response message after submission -->
    </div>

    <script src="script.js"></script>
</body>
</html>
